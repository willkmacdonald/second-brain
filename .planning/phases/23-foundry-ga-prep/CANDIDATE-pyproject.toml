[project]
name = "second-brain-backend"
version = "0.1.0"
description = "The Active Second Brain - FastAPI backend with Azure AI Foundry Agent Service"
requires-python = ">=3.12"
dependencies = [
    # Agent Framework -- GA (Microsoft Agent Framework + Foundry integration)
    # NOTE: pin agent-framework-core directly, NOT agent-framework meta-package.
    # The meta-package's [all] extra transitively pulls agent-framework-azure-ai-search==0.0.0a1
    # which ships a 0-byte agent_framework/__init__.py that overwrites the real one.
    # See P1-4b retraction note in .planning/phases/24-foundry-ga-migration/24-PLAN-DEFECTS.md.
    # The codebase imports:
    #   from agent_framework import Agent, ChatOptions, Message, tool        # provided by core
    #   from agent_framework.observability import enable_instrumentation     # provided by core
    #   from agent_framework_foundry import FoundryChatClient                # direct pin below
    "agent-framework-core>=1.3.0,<2",
    "agent-framework-foundry",
    # Azure OpenAI (direct dep for transcribe_audio -- transitive via azure-ai-agents)
    "openai",
    # Azure services
    "azure-cosmos",
    "azure-identity",
    "azure-keyvault-secrets",
    "azure-monitor-query>=2.0.0",
    "azure-storage-blob",
    # Observability -- Application Insights via OTel distro
    "azure-monitor-opentelemetry>=1.8.6",
    "azure-core-tracing-opentelemetry",
    # Web framework + ASGI server (previously transitive via agent-framework-ag-ui)
    "fastapi",
    "uvicorn[standard]",
    # Async HTTP transport (required by azure-identity async credentials)
    "aiohttp",
    # Required by FastAPI for UploadFile
    "python-multipart",
    # Configuration
    "pydantic-settings",
    "python-dotenv",
    # Recipe URL fetching (Playwright headless browser + HTML parsing)
    "playwright",
    "beautifulsoup4",
    "lxml",
]

[project.optional-dependencies]
dev = [
    "ruff",
]
test = [
    "pytest",
    "pytest-asyncio",
    "httpx",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/second_brain"]

[tool.ruff]
line-length = 88

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "N"]

[tool.ruff.lint.per-file-ignores]
# main.py must call load_dotenv() and configure_azure_monitor() before other imports
"src/second_brain/main.py" = ["E402", "I001"]
# Document models use camelCase field names to match Cosmos DB JSON schema
"src/second_brain/models/documents.py" = ["N815"]
# Classification tools access camelCase ClassificationMeta fields
"src/second_brain/tools/classification.py" = ["N815"]
# Transcription tools access camelCase fields
"src/second_brain/tools/transcription.py" = ["N815"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
markers = [
    "integration: marks tests that hit deployed services (deselect with '-m \"not integration\"')",
]
