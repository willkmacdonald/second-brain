# Phase 24 P1-7 admin golden seeding manifest.
#
# Cases curated 2026-05-11 from real production admin agent traces
# (last 7 days, AppTraces "Admin Agent processed inbox item ..." messages).
# Source query: /investigate "show me last 20 admin agent runs"
# Captured via mcp__second-brain-telemetry__run_kql on AppTraces.
#
# Field semantics:
# - capture_text: verbatim (or near-verbatim) reconstruction of the user's input
# - expected_destination:
#     - For errand captures: the destination SLUG (lowercase, url-safe) that
#       add_errand_items should attach to each item. "jewel" matches what
#       appeared in destination deletion logs.
#     - For task captures: "unrouted". add_task_items captures no destination,
#       so DryRunAdminTools leaves captured_destinations empty, and the runner
#       defaults predicted to "unrouted" — this is the correct expected value
#       for non-routed admin captures.
# - expected_tool: which output tool the agent MUST call
#     ("add_errand_items" or "add_task_items"). Used by post-hoc inspection.
#
# Format: snake_case here; the seed script translates to camelCase before upsert.
# The script writes documents with userId="will" + inputText (not captureText)
# to match the admin eval runner's existing query contract.

cases:
  # ---- Task captures (8 cases) ----

  - capture_text: "Pay the electric bill before it is due next Friday"
    expected_destination: "unrouted"
    expected_tool: "add_task_items"

  - capture_text: "pick up the dry cleaning Friday"
    expected_destination: "unrouted"
    expected_tool: "add_task_items"

  - capture_text: "Book the veterinarian appointment for the cats next Tuesday"
    expected_destination: "unrouted"
    expected_tool: "add_task_items"

  - capture_text: "Call the dentist to schedule annual cleaning appointment"
    expected_destination: "unrouted"
    expected_tool: "add_task_items"

  - capture_text: "Schedule annual physical checkup next month"
    expected_destination: "unrouted"
    expected_tool: "add_task_items"

  - capture_text: "do your expenses"
    expected_destination: "unrouted"
    expected_tool: "add_task_items"

  - capture_text: "remind me about the thing"
    expected_destination: "unrouted"
    expected_tool: "add_task_items"

  - capture_text: "Submit expense report by Friday"
    expected_destination: "unrouted"
    expected_tool: "add_task_items"

  # ---- Errand captures (3 cases) ----

  - capture_text: "apples and bread"
    expected_destination: "jewel"
    expected_tool: "add_errand_items"

  - capture_text: "milk"
    expected_destination: "jewel"
    expected_tool: "add_errand_items"

  - capture_text: "get the ingredients from the Best Chocolate Chip Cookies recipe"
    expected_destination: "jewel"
    expected_tool: "add_errand_items"
